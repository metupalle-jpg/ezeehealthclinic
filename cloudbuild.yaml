steps:
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gsutil -m rsync -r -x "api/" 2ndOpinion/ gs://ezeehealthcare-2ndopinion/'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'me-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/2ndopinion-api', '2ndOpinion/api']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'me-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/2ndopinion-api']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', '2ndopinion-api', '--image', 'me-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/2ndopinion-api', '--region', 'me-central1', '--platform', 'managed', '--allow-unauthenticated', '--set-env-vars', 'GCS_BUCKET=ezeehealthcare-2ndopinion-uploads,GCP_PROJECT=$PROJECT_ID']
options:
  logging: CLOUD_LOGGING_ONLY
